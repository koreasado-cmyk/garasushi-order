<title>가라스시 발주</title>
<style>
  :root{
    --primary:#1F4E78; --kakao:#FEE500;
    --hot:#C00000; --mid:#D08700; --low:#548235;
    --bg-hot:#FFE2E2; --bg-mid:#FFF4D6; --bg-low:#E2F0D9;
    --gray-50:#FAFAFA; --gray-100:#F2F2F2; --gray-300:#D9D9D9;
    --gray-600:#595959; --gray-900:#1A1A1A;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'맑은 고딕','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--gray-50);color:var(--gray-900);font-size:15px;line-height:1.4;}
  body{padding-bottom:90px;}
  /* 점포 선택 화면 */
  .picker{position:fixed;inset:0;background:linear-gradient(180deg,#1F4E78 0%,#163E5F 100%);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:1000;}
  .picker.hide{display:none;}
  .picker .logo{font-size:64px;margin-bottom:8px;}
  .picker h1{margin:0;font-size:22px;font-weight:700;letter-spacing:-0.3px;}
  .picker .tagline{margin:6px 0 30px;font-size:13px;opacity:.8;}
  .picker .store-btn{width:100%;max-width:340px;padding:22px;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);border-radius:18px;color:#fff;font-size:18px;font-weight:700;margin-bottom:14px;cursor:pointer;backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;text-align:left;}
  .picker .store-btn:active{background:rgba(255,255,255,.22);}
  .picker .store-btn .arrow{opacity:.6;}
  .picker .install-hint{margin-top:28px;max-width:340px;font-size:12px;opacity:.7;text-align:center;line-height:1.55;}

  header{position:sticky;top:0;z-index:50;background:var(--primary);color:#fff;padding:14px 16px env(safe-area-inset-top,0) 16px;box-shadow:0 2px 8px rgba(0,0,0,.15);display:flex;align-items:center;gap:12px;}
  header .back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0;line-height:1;}
  header .title{flex:1;}
  header h1{margin:0;font-size:17px;font-weight:700;}
  header .sub{font-size:11px;opacity:.85;margin-top:2px;}
  .meta{display:flex;gap:8px;padding:12px;background:#fff;border-bottom:1px solid var(--gray-300);}
  .meta input{flex:1;border:1px solid var(--gray-300);border-radius:8px;padding:10px 12px;font-size:14px;background:var(--gray-50);}
  .meta input:focus{outline:none;border-color:var(--primary);background:#fff;}
  .filter{padding:10px 12px;background:#fff;border-bottom:1px solid var(--gray-300);position:sticky;top:60px;z-index:40;}
  .filter input{width:100%;border:1px solid var(--gray-300);border-radius:24px;padding:10px 16px;font-size:14px;background:var(--gray-50);}
  .filter input:focus{outline:none;border-color:var(--primary);background:#fff;}
  .tier-filters{display:flex;gap:6px;margin-top:10px;}
  .tier-filter{flex:1;padding:7px 6px;border-radius:20px;border:1.5px solid var(--gray-300);background:#fff;font-size:12px;font-weight:600;color:var(--gray-600);cursor:pointer;text-align:center;}
  .tier-filter.active{color:#fff;border-color:transparent;}
  .tier-filter.active[data-tier="hot"]{background:var(--hot);}
  .tier-filter.active[data-tier="mid"]{background:var(--mid);}
  .tier-filter.active[data-tier="low"]{background:var(--low);}
  .tier-filter.active[data-tier="all"]{background:var(--primary);}
  .vendor{margin-top:8px;background:#fff;}
  .vendor-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#fff;border-bottom:1px solid var(--gray-300);position:sticky;top:128px;z-index:30;cursor:pointer;}
  .vendor-head h2{margin:0;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .vendor-head .count{font-size:12px;color:var(--gray-600);font-weight:500;background:var(--gray-100);padding:3px 9px;border-radius:12px;}
  .vendor-head .count.active{background:var(--primary);color:#fff;}
  .vendor.collapsed .vendor-body{display:none;}
  .vendor-head .caret{transition:transform .2s;}
  .vendor.collapsed .vendor-head .caret{transform:rotate(-90deg);}
  .tier-group-label{display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:12px;font-weight:700;color:var(--gray-600);background:var(--gray-50);border-bottom:1px solid var(--gray-300);}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;}
  .dot.hot{background:var(--hot);} .dot.mid{background:var(--mid);} .dot.low{background:var(--low);}
  .item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--gray-100);}
  .item .name{flex:1;min-width:0;}
  .item .name .title{font-size:14px;font-weight:500;color:var(--gray-900);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .item .name .info{font-size:11px;color:var(--gray-600);margin-top:2px;}
  .item .qty{display:flex;align-items:center;gap:6px;}
  .item .qty button{width:32px;height:32px;border:1px solid var(--gray-300);background:#fff;border-radius:8px;font-size:18px;font-weight:600;color:var(--primary);cursor:pointer;line-height:1;}
  .item .qty button:active{background:var(--gray-100);}
  .item .qty input{width:54px;text-align:center;border:1.5px solid var(--gray-300);border-radius:8px;padding:7px 4px;font-size:15px;font-weight:600;background:#fff;}
  .item .qty input:focus{outline:none;border-color:var(--primary);}
  .item.checked{background:#EAFBE7;}
  .item.checked .name .title{color:#006100;}
  .item[data-tier="hot"]{border-left:3px solid var(--hot);}
  .item[data-tier="mid"]{border-left:3px solid var(--mid);}
  .item[data-tier="low"]{border-left:3px solid var(--low);}
  .actionbar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:10px 12px calc(10px + env(safe-area-inset-bottom,0)) 12px;display:flex;gap:8px;border-top:1px solid var(--gray-300);box-shadow:0 -2px 12px rgba(0,0,0,.08);z-index:60;}
  .actionbar .count-pill{flex:0 0 auto;display:flex;align-items:center;padding:0 14px;border-radius:24px;background:var(--gray-100);font-size:13px;font-weight:600;color:var(--gray-600);}
  .actionbar button{padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;}
  .actionbar .btn-go{flex:1;background:var(--kakao);color:#3C1E1E;}
  .actionbar .btn-go:active{background:#E5CC00;}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;z-index:100;}

  .modal-body{background:#fff;width:100%;max-height:85vh;border-radius:18px 18px 0 0;padding:20px;display:flex;flex-direction:column;}
  .modal-body h3{margin:0 0 12px 0;font-size:16px;}
  .modal-body textarea{flex:1;width:100%;min-height:300px;border:1px solid var(--gray-300);border-radius:10px;padding:12px;font-family:inherit;font-size:13px;line-height:1.6;resize:none;background:var(--gray-50);}
  .modal-actions{display:flex;gap:8px;margin-top:14px;}
  .modal-actions button{flex:1;padding:13px;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;}
  .modal .close{background:var(--gray-100);color:var(--gray-900);}
  .modal .btn-copy{background:var(--primary);color:#fff;}
  .modal .btn-share{background:var(--kakao);color:#3C1E1E;}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:12px 20px;border-radius:24px;font-size:13px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}
  .install-banner{position:fixed;bottom:80px;left:12px;right:12px;background:#fff;border:1.5px solid var(--primary);border-radius:14px;padding:14px;display:none;align-items:center;gap:10px;z-index:55;box-shadow:0 6px 24px rgba(0,0,0,.12);}
  .install-banner.show{display:flex;}
  .install-banner .txt{flex:1;font-size:13px;}
  .install-banner .txt strong{display:block;font-size:14px;margin-bottom:2px;}
  .install-banner button{padding:8px 14px;border-radius:10px;border:none;font-weight:700;cursor:pointer;font-size:13px;}
  .install-banner .btn-add{background:var(--primary);color:#fff;}
  .install-banner .btn-skip{background:var(--gray-100);color:var(--gray-600);}
  .hidden{display:none!important;}
</style>
</head>

<!-- 점포 선택 화면 -->
<div class="picker" id="picker">
  <div class="logo">🍣</div>
  <h1>가라스시 발주</h1>
  <div class="tagline">점포를 선택하세요</div>
  <button class="store-btn" data-store="가경점">

  </button>
  <button class="store-btn" data-store="방서점">
    <span>📍 방서점</span><span class="arrow">→</span>
  </button>
  <div class="install-hint">
    💡 처음 사용 시 브라우저 메뉴에서 <b>"홈 화면에 추가"</b> 를 누르면<br/>
    앱처럼 빠르게 실행할 수 있습니다.
  </div>
</div>

<!-- 메인 -->
<header style="display:none" id="header">
  <button class="back" onclick="backToPicker()">‹</button>
  <div class="title">
    <h1 id="storeTitle"></h1>
    <div class="sub">2026년 1~4월 주문이력 기준 · 빈도순</div>
  </div>
</header>

<div class="meta" id="metaBlock" style="display:none">
  <input id="date" type="date" />
  <input id="writer" type="text" placeholder="작성자" autocomplete="name" />
</div>

<div class="filter" id="filterBlock" style="display:none">
  <input id="search" type="search" placeholder="🔍 품목 검색" />
  <div class="tier-filters">
    <button class="tier-filter active" data-tier="all">전체</button>
    <button class="tier-filter" data-tier="hot">🔴 매우 빈번</button>
    <button class="tier-filter" data-tier="mid">🟡 빈번</button>
    <button class="tier-filter" data-tier="low">🟢 가끔</button>
  </div>
</div>

<div id="vendors"></div>

<div class="actionbar" id="actionbar" style="display:none">
  <div class="count-pill"><span id="checkedCount">0</span>건</div>
  <button class="btn-go" id="btn-preview">💬 카톡으로 보내기</button>
</div>

<!-- 설치 안내 배너 -->
<div class="install-banner" id="installBanner">
  <div class="txt"><strong>홈 화면에 추가</strong>다음부터 앱처럼 한 번에 실행</div>
  <button class="btn-add" id="btnInstall">추가</button>
  <button class="btn-skip" onclick="dismissInstall()">×</button>
</div>

<!-- 미리보기/공유 모달 -->
<div class="modal" id="modal">
  <div class="modal-body">
    <h3>📋 발주서 미리보기</h3>
    <textarea id="output" readonly></textarea>
    <div class="modal-actions">
      <button class="close" onclick="closeModal()">닫기</button>
      <button class="btn-copy" onclick="copyText()">📋 복사</button>
      <button class="btn-share" onclick="shareText()">💬 공유</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

 "tier": "low"}, {"name": "케찹(오뚜기)스파우트팩", "qty": 1.0, "price": 7000, "tier": "low"}, {"name": "치킨스탁(매기.병)", "qty": 1.0, "price": 12500, "tier": "low"}, {"name": "프리미엄 돈까스(송림)", "qty": 1.0, "price": 16800, "tier": "low"}, {"name": "표고버섯(야채)국내산A", "qty": 1.0, "price": 12833, "tier": "low"}, {"name": "호일(30*30)삼진", "qty": 1.0, "price": 4700, "tier": "low"}, {"name": "하나가스오브시(고명용)500g", "qty": 1.0, "price": 16500, "tier": "low"}, {"name": "후리카케(이엔)", "qty": 1.0, "price": 8500, "tier": "low"}, {"name": "흑후추분말(목화)", "qty": 1.0, "price": 8500, "tier": "low"}]}]};
const TIER_LABEL = {hot:'매우 빈번', mid:'빈번', low:'가끔'};
const TIER_EMOJI = {hot:'🔴', mid:'🟡', low:'🟢'};

let currentStore = null;
let currentVendors = [];
let filterTier = 'all';
let searchText = '';
let installPromptEvent = null;

const root = document.getElementById('vendors');
const stateKey = () => 'order_' + currentStore;
let state = {};

function saveState(){ localStorage.setItem(stateKey(), JSON.stringify(state)); }
function loadState(){ state = JSON.parse(localStorage.getItem(stateKey()) || '{}'); }
function itemKey(v, i){ return v.name + '|' + i.name; }

// ===== 점포 선택 =====
document.querySelectorAll('.store-btn').forEach(b => {
  b.onclick = () => selectStore(b.dataset.store);
});

function selectStore(name){
  currentStore = name;
  currentVendors = STORES[name];
  localStorage.setItem('lastStore', name);
  loadState();
  document.getElementById('picker').classList.add('hide');
  document.getElementById('header').style.display = '';
  document.getElementById('metaBlock').style.display = '';
  document.getElementById('filterBlock').style.display = '';
  document.getElementById('actionbar').style.display = '';
  document.getElementById('storeTitle').textContent = '🍣 가라스시 ' + name;
  render();
}

function backToPicker(){
  document.getElementById('picker').classList.remove('hide');
  document.getElementById('header').style.display = 'none';
  document.getElementById('metaBlock').style.display = 'none';
  document.getElementById('filterBlock').style.display = 'none';
  document.getElementById('actionbar').style.display = 'none';
}
window.backToPicker = backToPicker;

// ===== 렌더 =====
function render(){
  root.innerHTML = '';
  currentVendors.forEach((v, vi) => {
    const sec = document.createElement('section');
    sec.className = 'vendor';
    sec.innerHTML = `
      <div class="vendor-head">
        <h2>${v.icon} ${v.name}</h2>
        <div>
          <span class="count" data-c="${vi}">${v.items.length}</span>
          <span class="caret">▾</span>
        </div>
      </div>
      <div class="vendor-body"></div>`;
    const body = sec.querySelector('.vendor-body');
    sec.querySelector('.vendor-head').onclick = () => sec.classList.toggle('collapsed');
    let lastTier = null;
    v.items.forEach((it) => {
      if(it.tier !== lastTier){
        const lbl = document.createElement('div');
        lbl.className = 'tier-group-label';
        lbl.innerHTML = `<span class="dot ${it.tier}"></span> ${TIER_EMOJI[it.tier]} ${TIER_LABEL[it.tier]}`;
        body.appendChild(lbl);
        lastTier = it.tier;
      }
      const k = itemKey(v, it);
      const q = state[k] || '';
      const row = document.createElement('div');
      row.className = 'item' + (q ? ' checked' : '');
      row.dataset.tier = it.tier;
      row.dataset.name = it.name;
      const unitStr = v.unit ? (' ' + v.unit) : '';
      row.innerHTML = `
        <div class="name">
          <div class="title">${escapeHTML(it.name)}</div>
          <div class="info">4개월 ${formatQty(it.qty)}${unitStr} · ${it.price.toLocaleString()}원</div>
        </div>
        <div class="qty">
          <button class="dec">−</button>
          <input type="number" inputmode="decimal" min="0" step="any" placeholder="0" value="${q}" />
          <button class="inc">+</button>
        </div>`;
      const inp = row.querySelector('input');
      inp.addEventListener('input', (e) => {
        const val = e.target.value.trim();
        if(val === '' || +val === 0){ delete state[k]; row.classList.remove('checked'); }
        else { state[k] = val; row.classList.add('checked'); }
        saveState(); updateCounts();
      });
      row.querySelector('.dec').onclick = () => {
        const cur = parseFloat(inp.value) || 0;
        inp.value = Math.max(0, cur - 1) || '';
        inp.dispatchEvent(new Event('input'));
      };
      row.querySelector('.inc').onclick = () => {
        const cur = parseFloat(inp.value) || 0;
        inp.value = cur + 1;
        inp.dispatchEvent(new Event('input'));
      };
      body.appendChild(row);
    });
    root.appendChild(sec);
  });
  applyFilter();
  updateCounts();
}

function formatQty(q){
  if(Number.isInteger(q)) return q.toLocaleString();
  return q.toFixed(1);
}
function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function updateCounts(){
  let total = 0;
  document.querySelectorAll('.vendor').forEach(sec => {
    let n = 0;
    sec.querySelectorAll('.item').forEach(it => {
      const v = it.querySelector('input').value;
      if(v && v !== '0') n++;
    });
    const c = sec.querySelector('[data-c]');
    if(n > 0){ c.textContent = n + '건'; c.classList.add('active'); }
    else { c.textContent = sec.querySelectorAll('.item').length; c.classList.remove('active'); }
    total += n;
  });
  document.getElementById('checkedCount').textContent = total;
}

function applyFilter(){
  const q = searchText.toLowerCase();
  document.querySelectorAll('.item').forEach(it => {
    const matchTier = filterTier === 'all' || it.dataset.tier === filterTier;
    const matchSearch = !q || it.dataset.name.toLowerCase().includes(q);
    it.classList.toggle('hidden', !(matchTier && matchSearch));
  });
  document.querySelectorAll('.vendor').forEach(sec => {
    const visible = Array.from(sec.querySelectorAll('.item')).filter(it => !it.classList.contains('hidden'));
    sec.classList.toggle('hidden', visible.length === 0);
    let prev = null; let prevHasVisible = false;
    sec.querySelectorAll('.tier-group-label, .item').forEach(el => {
      if(el.classList.contains('tier-group-label')){
        if(prev && !prevHasVisible) prev.classList.add('hidden');
        prev = el; prevHasVisible = false;
        el.classList.remove('hidden');
      } else if(!el.classList.contains('hidden')) {
        prevHasVisible = true;
      }
    });
    if(prev && !prevHasVisible) prev.classList.add('hidden');
  });
}

document.getElementById('search').addEventListener('input', e => { searchText = e.target.value; applyFilter(); });
document.querySelectorAll('.tier-filter').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.tier-filter').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    filterTier = b.dataset.tier;
    applyFilter();
  };
});

// ===== 발주서 텍스트 빌드 =====
function buildText(){
  const d = document.getElementById('date').value;
  const w = document.getElementById('writer').value.trim();
  const lines = [];
  lines.push(`📋 가라스시 ${currentStore} 발주서`);
  lines.push(`🗓 ${d || '____-__-__'}${w ? '  /  ✍️ ' + w : ''}`);
  let total = 0;
  currentVendors.forEach(v => {
    const ordered = [];
    v.items.forEach(it => {
      const k = itemKey(v, it);
      const q = state[k];
      if(q && +q > 0) ordered.push({...it, oq: q});
    });
    if(ordered.length === 0) return;
    lines.push('');
    lines.push(`━━━━━━━━━━━━━`);
    lines.push(`${v.icon} ${v.name} (${ordered.length}건)`);
    lines.push(`━━━━━━━━━━━━━`);
    ordered.forEach(it => {
      const unit = v.unit ? (' ' + v.unit) : '';
      lines.push(`${TIER_EMOJI[it.tier]} ${it.name} — ${it.oq}${unit}`);
      total++;
    });
  });
  if(total === 0) return `📋 가라스시 ${currentStore} 발주서\n\n(아직 발주 품목이 없습니다)`;
  lines.push('');
  lines.push(`✅ 총 ${total}건`);
  return lines.join('\n');
}

document.getElementById('btn-preview').onclick = () => {
  document.getElementById('output').value = buildText();
  document.getElementById('modal').classList.add('open');
};
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
window.closeModal = closeModal;

async function copyText(){
  const text = document.getElementById('output').value;
  try{ await navigator.clipboard.writeText(text); toast('✔ 복사 완료! 카톡에 붙여넣으세요'); }
  catch(e){
    const ta = document.getElementById('output'); ta.select(); document.execCommand('copy');
    toast('✔ 복사 완료');
  }
}
window.copyText = copyText;

async function shareText(){
  const text = document.getElementById('output').value;
  if(navigator.share){
    try{ await navigator.share({ title:'가라스시 '+currentStore+' 발주서', text }); }
    catch(e){}
  } else { copyText(); }
}
window.shareText = shareText;

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== PWA 설치 안내 =====
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  installPromptEvent = e;
  if(!localStorage.getItem('installDismissed')){
    setTimeout(() => document.getElementById('installBanner').classList.add('show'), 3000);
  }
});
document.getElementById('btnInstall').onclick = async () => {
  if(installPromptEvent){
    installPromptEvent.prompt();
    await installPromptEvent.userChoice;
    installPromptEvent = null;
  }
  dismissInstall();
};
function dismissInstall(){
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('installDismissed', '1');
}
window.dismissInstall = dismissInstall;

// ===== 초기화 =====
document.getElementById('date').valueAsDate = new Date();
const last = localStorage.getItem('lastStore');
if(last && STORES[last]){
  // 마지막 점포로 자동 진입
  selectStore(last);
}
</script>
