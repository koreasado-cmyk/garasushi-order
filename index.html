  .modal .close{background:var(--gray-100);color:var(--gray-900);}
  .modal .btn-copy{background:var(--primary);color:#fff;}
  .modal .btn-kakao{background:var(--kakao);color:var(--kakao-text);}
  .modal .btn-save{background:#006100;color:#fff;}

  .history-list{flex:1;overflow:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
  .history-item{padding:12px;background:var(--gray-50);border-radius:10px;border:1px solid var(--gray-200);position:relative;}
  .history-item .h-content{cursor:pointer;}

  .history-item .h-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:8px;}

  .history-item .h-del:active{background:var(--gray-200);}
  .history-empty{text-align:center;color:var(--gray-600);font-size:13px;padding:40px 20px;}

  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:12px 20px;border-radius:24px;font-size:13px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90vw;}
  .toast.show{opacity:1;}

  .settings{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;padding:16px;z-index:150;}
  .settings.open{display:flex;}
  .settings-body{background:#fff;width:100%;max-width:400px;border-radius:14px;padding:20px;}
  .settings-body h3{margin:0 0 6px;font-size:17px;}
  .settings-body .desc{font-size:12px;color:var(--gray-600);margin-bottom:16px;line-height:1.6;}

  .settings .guide{margin-top:14px;font-size:11px;color:var(--gray-600);background:var(--gray-50);padding:10px;border-radius:8px;line-height:1.6;}
  .settings .guide a{color:var(--primary);}

  .hidden{display:none!important;}
</style>
</head>

function safeParse(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    if(!raw) return fallback;
    const v = JSON.parse(raw);
    return v == null ? fallback : v;
  } catch(e){ console.warn('parse fail', key, e); return fallback; }
}
function todayLocal(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function escapeHTML(s){
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function isValidQty(v){
  if(v === '' || v == null) return false;
  const n = Number(v);
  return Number.isFinite(n) && n > 0;
}
function formatQty(q){ return Number.isInteger(q) ? q.toLocaleString() : q.toFixed(1); }
const WEEKDAY_KR = ['일','월','화','수','목','금','토'];
function dayOfWeekIdx(dateStr){
  if(!dateStr) return -1;
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(dateStr);
  if(!m) return -1;
  const d = new Date(+m[1], +m[2]-1, +m[3]);
  if(isNaN(d.getTime())) return -1;
  return d.getDay();
}
function dayOfWeek(dateStr){
  const i = dayOfWeekIdx(dateStr);
  return i < 0 ? '' : WEEKDAY_KR[i];
}
function updateDateWeekday(){
  const v = document.getElementById('date').value;
  const chip = document.getElementById('dateWeekday');
  const i = dayOfWeekIdx(v);
  if(i < 0){ chip.textContent = ''; chip.className = 'weekday-chip'; return; }
  chip.textContent = WEEKDAY_KR[i];
  chip.className = 'weekday-chip' + (i === 0 ? ' sun' : i === 6 ? ' sat' : '');
}
function countOtherLines(text){
  if(!text) return 0;
  return text.split('\n').filter(l => l.trim()).length;
}

// 안전한 localStorage 저장 (quota 초과 시 이력 축소 + 재시도)
function safeSet(key, value){
  try{ localStorage.setItem(key, value); return true; }
  catch(e){
    if(e && (e.name === 'QuotaExceededError' || e.code === 22 || e.code === 1014)){
      // 오래된 이력 절반 잘라내고 재시도
      const hk = historyKey();
      const hist = safeParse(hk, []);
      if(hist.length > 1){
        const trimmed = hist.slice(0, Math.max(5, Math.floor(hist.length / 2)));
        try{
          localStorage.setItem(hk, JSON.stringify(trimmed));
          localStorage.setItem(key, value);
          toast('⚠ 저장공간 부족 - 오래된 이력 일부 삭제');
          return true;
        } catch(e2){
          toast('⚠ 저장공간 부족 - 이력을 정리해 주세요'); return false;
        }
      }
      toast('⚠ 저장공간 부족'); return false;
    }
    console.warn('set fail', key, e);
    return false;
  }
}

let currentStore = null;
let currentVendors = [];
let activeVendorIdx = 0;
let filterTier = 'all';
let searchText = '';
let state = {};
let otherText = {};
let modalActiveVendor = 'all';
let currentHistIdx = -1;
let userEditedPreview = false;

function stateKey(){ return 'order_' + currentStore; }
function otherKey(){ return 'other_' + currentStore; }
function historyKey(){ return 'history_' + currentStore; }
function writerKey(){ return 'writer_' + currentStore; }

// itemKey: 안전 구분자(U+001F) + 인덱스 → 충돌 방지
function itemKey(v, i){ return v.name + SEP + i._idx + SEP + i.name; }

// 점포 진입 시 모든 아이템에 _idx 부여 (안정 키 보장)
function indexItems(){
  currentVendors.forEach(v => v.items.forEach((it, idx) => it._idx = idx));
}

// 저장 디바운스
let saveTimer = null;
function saveState(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveStateImmediate, 200);
}
function saveStateImmediate(){
  if(saveTimer){ clearTimeout(saveTimer); saveTimer = null; }
  safeSet(stateKey(), JSON.stringify(state));
  safeSet(otherKey(), JSON.stringify(otherText));
}

function loadState(){
  const raw = safeParse(stateKey(), {}) || {};
  const newState = {};
  Object.keys(raw).forEach(oldKey => {
    let val = raw[oldKey];
    if(typeof val === 'string' || typeof val === 'number'){
      val = { qty: String(val), unit: null };
    }
    if(oldKey.includes(SEP)){
      newState[oldKey] = val;
    } else if(oldKey.includes('|')){
      // 옛 형식: "거래처|품목" → 새 키로 마이그레이션
      const sepIdx = oldKey.indexOf('|');
      const vName = oldKey.slice(0, sepIdx);
      const iName = oldKey.slice(sepIdx + 1);
      const v = currentVendors.find(vv => vv.name === vName);
      if(!v) return;
      const item = v.items.find(it => it.name === iName);
      if(!item) return;
      newState[itemKey(v, item)] = val;
    }
  });
  state = newState;
  otherText = safeParse(otherKey(), {}) || {};
}

function initKakao(){
  if(!window.Kakao){
    if(window.__kakaoCdnFailed) console.warn('Kakao CDN load failed');
    return false;

  const key = localStorage.getItem('kakaoAppKey');
  if(!key) return false;
  if(!Kakao.isInitialized()){
    try{ Kakao.init(key); } catch(e){ return false; }
  }
  return Kakao.isInitialized();
}

function renderVendors(){
  const root = document.getElementById('vendors');
  root.innerHTML = '';
  currentVendors.forEach((v, vi) => {
    const sec = document.createElement('section');
    sec.className = 'vendor-body';
    sec.dataset.vi = vi;
    if(vi !== activeVendorIdx) sec.classList.add('hidden');
    v.items.forEach((it) => {
      const k = itemKey(v, it);
      const saved = state[k] || {};
      const q = saved.qty || '';
      const u = saved.unit || it.defaultUnit || v.defaultUnit || '낱개';
      const row = document.createElement('div');
      row.className = 'item' + (q ? ' checked' : '');
      row.dataset.tier = it.tier;
      row.dataset.name = it.name;
      row.dataset.selected = q ? '1' : '0';
      row.innerHTML = `
        <div class="item-row">
          <div class="name">
            <div class="title">${escapeHTML(it.name)}</div>
            <div class="info">4개월 ${formatQty(it.qty)} · ${it.price.toLocaleString()}원</div>
          </div>
          <div class="qty-bar">
            <button class="dec" type="button">−</button>
            <input type="text" inputmode="decimal" pattern="[0-9.]*" placeholder="0" value="${escapeHTML(q)}" />
            <button class="inc" type="button">+</button>
            <select class="unit">
              ${UNIT_OPTIONS.map(uo => `<option value="${escapeHTML(uo)}"${uo===u?' selected':''}>${escapeHTML(uo)}</option>`).join('')}
            </select>
          </div>
        </div>`;
      const inp = row.querySelector('input');
      const sel = row.querySelector('.unit');
      function commit(){
        const val = (inp.value || '').trim().replace(/,/g, '');
        if(!isValidQty(val)){
          delete state[k]; row.classList.remove('checked'); row.dataset.selected = '0';
        } else {
          state[k] = { qty: val, unit: sel.value };
          row.classList.add('checked'); row.dataset.selected = '1';
        }
        saveState(); updateCounts();
        if(filterTier === 'sel') applyFilter();
      }
      inp.addEventListener('input', () => {
        // 잘못된 문자 자동 정리
        const cleaned = inp.value.replace(/[^0-9.]/g, '');
        if(cleaned !== inp.value) inp.value = cleaned;
        commit();
      });
      sel.addEventListener('change', () => { if(isValidQty(inp.value)) commit(); });
      attachHoldRepeat(row.querySelector('.dec'),
        () => { const c = parseFloat(inp.value) || 0; inp.value = Math.max(0, c - 1) || ''; commit(); },
        () => { const c = parseFloat(inp.value) || 0; inp.value = Math.max(0, c - 5) || ''; commit(); });
      attachHoldRepeat(row.querySelector('.inc'),
        () => { const c = parseFloat(inp.value) || 0; inp.value = c + 1; commit(); },
        () => { const c = parseFloat(inp.value) || 0; inp.value = c + 5; commit(); });
      sec.appendChild(row);
    });
    const other = document.createElement('div');
    other.className = 'other-input';
    const lbl = document.createElement('label');
    lbl.textContent = '✏ 기타 품목 직접 입력 (' + v.name + ')';
    const ta = document.createElement('textarea');
    ta.placeholder = '예: 굴 1박스\n전복 5kg\n(목록에 없는 품목은 여기에 적으세요)';
    ta.value = otherText[v.name] || '';
    const hint = document.createElement('div');
    hint.className = 'hint';
    hint.textContent = '💡 라인 수만큼 카운트되어 발주서에 합쳐서 발송됩니다';
    ta.addEventListener('input', e => {
      const txt = e.target.value;
      if(txt) otherText[v.name] = txt; else delete otherText[v.name];
      saveState(); updateCounts();
    });
    other.appendChild(lbl); other.appendChild(ta); other.appendChild(hint);
    sec.appendChild(other);
    root.appendChild(sec);
  });
  applyFilter();
}

// PointerEvents 기반 길게누르기 (touch/mouse 이중 발생 차단)
function attachHoldRepeat(el, tap, holdAction){
  let timer = null, intervalTimer = null, isHolding = false, pid = null;
  function clear(){
    if(timer){ clearTimeout(timer); timer = null; }
    if(intervalTimer){ clearInterval(intervalTimer); intervalTimer = null; }
  }
  el.addEventListener('pointerdown', e => {
    e.preventDefault();
    if(pid !== null) return;  // 다른 포인터 무시
    pid = e.pointerId;
    try { el.setPointerCapture(pid); } catch(_){}
    isHolding = false;
    timer = setTimeout(() => {
      isHolding = true;
      holdAction();
      intervalTimer = setInterval(holdAction, 250);
    }, 450);
  });
  function release(e){
    if(e.pointerId !== pid) return;
    clear();
    if(!isHolding) tap();
    isHolding = false; pid = null;
  }
  el.addEventListener('pointerup', release);
  el.addEventListener('pointercancel', e => { if(e.pointerId === pid){ clear(); isHolding = false; pid = null; } });
  el.addEventListener('pointerleave', e => { if(e.pointerId === pid){ clear(); } });
}

function showActiveVendor(){
  document.querySelectorAll('.vendor-body').forEach(s => {
    s.classList.toggle('hidden', +s.dataset.vi !== activeVendorIdx);
  });

function updateCounts(){
  let total = 0, totalItems = 0, totalOther = 0;
  currentVendors.forEach((v, vi) => {
    let n = 0;
    v.items.forEach(it => {
      const k = itemKey(v, it);
      if(state[k] && isValidQty(state[k].qty)) n++;
    });
    const ol = countOtherLines(otherText[v.name] || '');
    n += ol;
    totalItems += (n - ol); totalOther += ol;
    const badge = document.querySelector(`.tab-badge[data-c="${vi}"]`);
    if(badge){
      badge.textContent = n;
      badge.classList.toggle('has', n > 0);
      badge.classList.toggle('zero', n === 0 && !searchText);
      badge.classList.remove('match');
    }
    total += n;
  });
  document.getElementById('checkedCount').textContent = total;
  document.getElementById('btn-preview').disabled = total === 0;
  // 헤더 부제 동적
  const sub = document.getElementById('storeSub');
  if(sub) sub.textContent = total > 0
    ? `${total}건 선택됨 (목록 ${totalItems}${totalOther ? ' + 기타 ' + totalOther : ''})`
    : '사용량 많은순 · 빈도색 좌측표시';
  // 검색 시 다른 탭 매칭
  if(searchText){
    const q = searchText.toLowerCase();
    currentVendors.forEach((v, vi) => {
      if(vi === activeVendorIdx) return;
      const m = v.items.filter(it => it.name.toLowerCase().includes(q)).length;
      if(m > 0){
        const badge = document.querySelector(`.tab-badge[data-c="${vi}"]`);
        if(badge){ badge.textContent = '🔍' + m; badge.classList.add('match'); badge.classList.remove('zero'); }
      }
    });
  }
}

function applyFilter(){
  const q = searchText.toLowerCase();
  const active = document.querySelector(`.vendor-body[data-vi="${activeVendorIdx}"]`);
  if(active){
    active.querySelectorAll('.item').forEach(it => {
      const matchTier =
        filterTier === 'all' ? true :
        filterTier === 'sel' ? it.dataset.selected === '1' :
        it.dataset.tier === filterTier;
      const matchSearch = !q || it.dataset.name.toLowerCase().includes(q);
      it.classList.toggle('hidden', !(matchTier && matchSearch));
    });
    // 검색 시 기타 입력 숨김
    const oi = active.querySelector('.other-input');
    if(oi) oi.classList.toggle('search-hidden', !!q);
  }
  updateCounts();
}

function buildOrderData(forVendor){
  const d = document.getElementById('date').value;
  const w = '';
  const sections = [];
  let itemCount = 0, otherCount = 0, totalAmount = 0;
  currentVendors.forEach(v => {
    if(forVendor && forVendor !== 'all' && v.name !== forVendor) return;
    const ordered = [];
    v.items.forEach(it => {
      const k = itemKey(v, it);
      const s = state[k];
      if(s && isValidQty(s.qty)){
        const q = parseFloat(s.qty);
        ordered.push({...it, oq: s.qty, ou: s.unit || it.defaultUnit || v.defaultUnit || '낱개'});
        totalAmount += (it.price || 0) * q;
        itemCount++;
      }
    });
    const ot = (otherText[v.name] || '').trim();
    const otherLines = ot ? ot.split('\n').filter(l => l.trim()) : [];
    otherCount += otherLines.length;
    if(ordered.length === 0 && otherLines.length === 0) return;
    sections.push({ vendor: v, ordered, otherLines });
  });
  return { date: d, writer: w, sections, itemCount, otherCount, totalAmount };
}

function formatOrderText(data){
  const lines = [];
  lines.push(`가라스시 ${currentStore} 발주서`);
  const dow = dayOfWeek(data.date);
  lines.push(`${data.date || '____-__-__'}${dow ? ' (' + dow + ')' : ''}`);
  data.sections.forEach(({vendor, ordered, otherLines}, idx) => {
    const cnt = ordered.length + otherLines.length;
    if(idx > 0) lines.push('');  // 첫 거래처 위는 빈 줄 없이 바로 붙임
    lines.push(`━━━━━━━━━━━━━`);
    lines.push(`${vendor.name} (${cnt}건)`);
    lines.push(`━━━━━━━━━━━━━`);
    ordered.forEach(it => {
      lines.push(`${it.name} — ${it.oq} ${it.ou}`);
    });
    if(otherLines.length){
      lines.push(`[기타]`);
      otherLines.forEach(l => lines.push(`  ${l.trim()}`));
    }
  });
  if(data.itemCount === 0 && data.otherCount === 0){
    return `가라스시 ${currentStore} 발주서\n\n(아직 발주 품목이 없습니다)`;
  }
  return lines.join('\n');
}

async function copyText(){
  const text = document.getElementById('output').value;
  try{ await navigator.clipboard.writeText(text); toast('✔ 복사 완료'); }
  catch(e){ const ta = document.getElementById('output'); ta.select(); document.execCommand('copy'); toast('✔ 복사 완료'); }
  promptSaveAfterSend();
}

async function sendKakao(){
  const text = document.getElementById('output').value;
  let success = false;
  if(initKakao()){
    try{
      Kakao.Share.sendDefault({
        objectType: 'text', text,
        link: { mobileWebUrl: location.href, webUrl: location.href },
        buttonTitle: '발주리스트 열기',
      });
      success = true;
    } catch(e){ console.error(e); }
  } else if(window.__kakaoCdnFailed){
    toast('카톡 SDK 로드 실패 — 시스템 공유로 대체');
  }
  if(!success){
    if(navigator.share){
      try{
        await navigator.share({ title:'가라스시 '+currentStore+' 발주서', text });
        success = true;
      } catch(e){
        if(e && e.name === 'AbortError') return;  // 사용자 취소 → 폴백 안 함
      }
    }
  }
  if(!success){ copyText(); return; }
  promptSaveAfterSend();
}

async function promptSaveAfterSend(){
  // 전송/복사 후 약간 지연하여 안내 (UX)
  setTimeout(async () => {
    const ok = await customConfirm('발주서를 보냈다면\n이력에 저장하고 입력란을 초기화할까요?', {okText:'저장+초기화', danger:false});
    if(ok) saveAndReset(true);
  }, 500);
}

async function saveAndReset(silent){
  const data = buildOrderData('all');
  if(data.itemCount === 0 && data.otherCount === 0){
    if(!silent) toast('발주할 품목이 없습니다');
    return;
  }
  // 명시적 [저장+초기화] 누른 경우만 확인 (silent=true는 발송 후 안내에서 이미 한 번 받음)
  if(!silent){
    const ok = await customConfirm('현재 입력 내용을 이력에 저장하고\n발주 화면을 초기화합니다.\n진행할까요?', {okText:'저장+초기화'});
    if(!ok) return;
  }
  const text = formatOrderText(data);
  const history = safeParse(historyKey(), []);
  history.unshift({
    ts: Date.now(),
    date: data.date,
    writer: data.writer,
    state: JSON.parse(JSON.stringify(state)),
    otherText: JSON.parse(JSON.stringify(otherText)),
    text,
    itemCount: data.itemCount,
    otherCount: data.otherCount,
    totalCount: data.itemCount + data.otherCount,
    totalAmount: data.totalAmount,
  });
  safeSet(historyKey(), JSON.stringify(history.slice(0, 50)));
  state = {}; otherText = {};
  saveStateImmediate();
  renderVendors();
  updateCounts();
  closeModal('modal');
  toast('✔ 이력 저장 + 초기화 완료');
}

function renderHistoryList(){

    list.appendChild(e);

  }
  history.forEach((h, idx) => {
    const div = document.createElement('div');
    div.className = 'history-item';
    const dt = new Date(h.ts);
    const dateStr = `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    const tc = h.totalCount != null ? h.totalCount : ((h.itemCount||0) + (h.otherCount||0));
    const summary = (h.text||'').split('\n').filter(l => l.includes(' — ') || l.trim().startsWith('[기타]') || /^ {2}\S/.test(l)).slice(0,3).map(l => l.trim()).join(' · ') || '(내용 없음)';
    const del = document.createElement('button');

    del.onclick = async (e) => {
      e.stopPropagation();
      if(!(await customConfirm('이 발주 이력을 삭제할까요?', {okText:'삭제', danger:true}))) return;
      const h2 = safeParse(historyKey(), []);
      h2.splice(idx, 1);
      safeSet(historyKey(), JSON.stringify(h2));
      renderHistoryList();
      toast('이력 삭제됨');
    };
    const content = document.createElement('div');
    content.className = 'h-content';
    content.innerHTML = `
      <div class="h-top">
        <div class="h-date">${escapeHTML(dateStr)}</div>
        <div class="h-store">${tc}건 / ₩${Math.round(h.totalAmount||0).toLocaleString()}</div>
      </div>
      <div class="h-summary">${escapeHTML(summary)}</div>`;
    content.onclick = () => showHistoryDetail(idx);
    div.appendChild(del); div.appendChild(content);
    list.appendChild(div);
  });
}

function showHistoryDetail(idx){
  const history = safeParse(historyKey(), []);
  const h = history[idx];
  if(!h) return;
  currentHistIdx = idx;
  document.getElementById('histOutput').value = h.text;
  document.getElementById('histTotal').textContent = '₩' + Math.round(h.totalAmount || 0).toLocaleString();
  openModal('historyDetailModal');
}

async function copyHistText(){
  const text = document.getElementById('histOutput').value;
  try{ await navigator.clipboard.writeText(text); toast('✔ 복사 완료'); }
  catch(e){ const ta = document.getElementById('histOutput'); ta.select(); document.execCommand('copy'); toast('✔ 복사 완료'); }
}

async function reorderFromHistory(){
  const history = safeParse(historyKey(), []);
  const h = history[currentHistIdx];
  if(!h) return;
  if(!(await customConfirm('이 발주 내용으로 입력란을 채울까요?\n현재 입력 내용은 사라집니다.', {okText:'불러오기'}))) return;
  state = JSON.parse(JSON.stringify(h.state || {}));
  otherText = JSON.parse(JSON.stringify(h.otherText || {}));
  saveStateImmediate();
  renderVendors();
  updateCounts();
  closeModal('historyDetailModal');
  closeModal('historyModal');
  toast('✔ 이력 불러옴 — 필요하면 수정 후 발송');
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal').forEach(m => {
  m.addEventListener('click', e => { if(e.target === m) m.classList.remove('open'); });
});
document.querySelectorAll('[data-close]').forEach(b => {
  b.onclick = () => closeModal(b.dataset.close);
});

// ===== 커스텀 confirm =====
function customConfirm(message, options={}){
  return new Promise(resolve => {
    const m = document.getElementById('confirmModal');
    document.getElementById('confirmText').textContent = message;
    const okBtn = document.getElementById('confirmOk');
    const cancelBtn = document.getElementById('confirmCancel');
    okBtn.textContent = options.okText || '확인';
    cancelBtn.textContent = options.cancelText || '취소';
    okBtn.classList.toggle('danger', !!options.danger);
    function cleanup(){
      m.classList.remove('open');
      okBtn.onclick = null;
      cancelBtn.onclick = null;
      m.removeEventListener('click', bgHandler);
    }
    function bgHandler(e){ if(e.target === m){ cleanup(); resolve(false); } }
    okBtn.onclick = () => { cleanup(); resolve(true); };
    cancelBtn.onclick = () => { cleanup(); resolve(false); };
    m.addEventListener('click', bgHandler);
    m.classList.add('open');
  });
}

function openSettings(){
  document.getElementById('apiKeyInput').value = localStorage.getItem('kakaoAppKey') || '';
  document.getElementById('settings').classList.add('open');
}
function closeSettings(){ document.getElementById('settings').classList.remove('open'); }
function saveApiKey(){
  const key = document.getElementById('apiKeyInput').value.trim();
  if(key){ localStorage.setItem('kakaoAppKey', key); toast('✔ 카톡 키 저장'); }
  else { localStorage.removeItem('kakaoAppKey'); }
  initKakao();
  closeSettings();
}
document.getElementById('settings').addEventListener('click', e => {
  if(e.target.id === 'settings') closeSettings();
});
window.openSettings = openSettings; window.closeSettings = closeSettings; window.saveApiKey = saveApiKey;

document.getElementById('date').addEventListener('input', updateDateWeekday);
